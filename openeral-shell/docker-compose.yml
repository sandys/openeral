services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: openeral
      POSTGRES_PASSWORD: openeral
      POSTGRES_DB: openeral
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openeral"]
      interval: 2s
      timeout: 5s
      retries: 10

  openeral-shell:
    build:
      context: ..
      dockerfile: openeral-shell/Dockerfile
    devices:
      - /dev/fuse
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "host=postgres user=openeral password=openeral dbname=openeral"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # WORKSPACE_ID: my-agent
      # WORKSPACE_CONFIG: '{"auto_dirs":[".claude",".claude/memory"]}'
    stdin_open: true
    tty: true

volumes:
  pgdata:
