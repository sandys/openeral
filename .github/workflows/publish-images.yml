name: Publish images

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
      - '.claude/skills/**'
      - '.dockerignore'
      - 'sandboxes/openeral/**'
      - 'vendor/openshell/**'
      - '.github/scripts/smoke_openshell.sh'
      - '.github/workflows/publish-images.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_REPO_BASE: ghcr.io/${{ github.repository_owner }}/openeral
  CANDIDATE_TAG: sha-${{ github.sha }}
  OPENSHELL_IMAGE_CACHE_SCOPE: publish-openshell-images

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pgmount
          POSTGRES_PASSWORD: pgmount
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pgmount"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          components: clippy

      - name: Cache Rust dependencies and build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust-1.85
          cache-workspaces: |
            . -> target

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfuse3-dev fuse3 pkg-config libpq-dev postgresql-client

      - name: Build and clippy
        env:
          TEST_DATABASE_URL: "host=localhost user=pgmount password=pgmount dbname=testdb"
        run: |
          cargo clippy --all-targets
          cargo test -p openeral-core --no-run

      - name: Rust integration tests
        env:
          TEST_DATABASE_URL: "host=localhost user=pgmount password=pgmount dbname=testdb"
        run: cargo test -p openeral-core

      - name: FUSE mount integration tests
        env:
          PGPASSWORD: pgmount
          DB_CONN: "host=localhost user=pgmount password=pgmount dbname=testdb"
          DB_HOST: localhost
          OPENERAL_TEST_MNT: /mnt/pgtest
        run: |
          sudo mkdir -p /mnt/pgtest
          sudo chmod 777 /mnt/pgtest
          sudo sed -i 's/#user_allow_other/user_allow_other/' /etc/fuse.conf || true
          bash tests/test_fuse_mount.sh

  build-cluster:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push cluster image
        uses: docker/build-push-action@v6
        with:
          context: vendor/openshell
          file: vendor/openshell/deploy/docker/Dockerfile.images
          target: cluster
          push: true
          tags: ${{ env.IMAGE_REPO_BASE }}/cluster:${{ env.CANDIDATE_TAG }}
          cache-from: type=gha,scope=${{ env.OPENSHELL_IMAGE_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.OPENSHELL_IMAGE_CACHE_SCOPE }}
          build-args: |
            OPENERAL_DEFAULT_IMAGE_REPO_BASE=${{ env.IMAGE_REPO_BASE }}
            OPENERAL_DEFAULT_IMAGE_TAG=${{ env.CANDIDATE_TAG }}

  build-gateway:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gateway image
        uses: docker/build-push-action@v6
        with:
          context: vendor/openshell
          file: vendor/openshell/deploy/docker/Dockerfile.images
          target: gateway
          push: true
          tags: ${{ env.IMAGE_REPO_BASE }}/gateway:${{ env.CANDIDATE_TAG }}
          cache-from: type=gha,scope=${{ env.OPENSHELL_IMAGE_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.OPENSHELL_IMAGE_CACHE_SCOPE }}
          build-args: |
            OPENERAL_DEFAULT_IMAGE_REPO_BASE=${{ env.IMAGE_REPO_BASE }}
            OPENERAL_DEFAULT_IMAGE_TAG=${{ env.CANDIDATE_TAG }}

  build-sandbox:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push sandbox image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: sandboxes/openeral/Dockerfile
          push: true
          tags: ${{ env.IMAGE_REPO_BASE }}/sandbox:${{ env.CANDIDATE_TAG }}
          cache-from: type=gha,scope=publish-sandbox
          cache-to: type=gha,mode=max,scope=publish-sandbox

  smoke-test:
    needs: [build-cluster, build-gateway, build-sandbox]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Install upstream OpenShell CLI
        run: |
          set -euo pipefail
          export OPENSHELL_INSTALL_DIR="${RUNNER_TEMP}/openshell/bin"
          mkdir -p "$OPENSHELL_INSTALL_DIR"
          curl -LsSf https://raw.githubusercontent.com/NVIDIA/OpenShell/main/install.sh | sh
          echo "$OPENSHELL_INSTALL_DIR" >> "$GITHUB_PATH"
          "$OPENSHELL_INSTALL_DIR/openshell" --version

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify mixed-stack guard
        env:
          CLUSTER_IMAGE: ${{ env.IMAGE_REPO_BASE }}/cluster:${{ env.CANDIDATE_TAG }}
        run: |
          set -euo pipefail
          output_file="$(mktemp)"
          status=0
          docker run --rm --privileged \
            -e IMAGE_REPO_BASE=ghcr.io/nvidia/openshell \
            "$CLUSTER_IMAGE" server --disable=traefik \
            >"$output_file" 2>&1 || status=$?
          cat "$output_file"
          if [ "$status" -eq 0 ]; then
            echo "Expected mixed-stack guard to fail" >&2
            exit 1
          fi
          grep -q "cannot resolve the upstream OpenShell gateway image" "$output_file"

      - name: Run OpenShell smoke test
        env:
          OPENSHELL_CLUSTER_IMAGE: ${{ env.IMAGE_REPO_BASE }}/cluster:${{ env.CANDIDATE_TAG }}
          OPENERAL_GATEWAY_IMAGE: ${{ env.IMAGE_REPO_BASE }}/gateway:${{ env.CANDIDATE_TAG }}
          OPENERAL_SANDBOX_IMAGE: ${{ env.IMAGE_REPO_BASE }}/sandbox:${{ env.CANDIDATE_TAG }}
          IMAGE_TAG: latest
          OPENSHELL_REGISTRY_USERNAME: ${{ github.actor }}
          OPENSHELL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/smoke_openshell.sh

  promote:
    needs: [smoke-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote candidate tags
        env:
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
        run: |
          set -euo pipefail

          promote() {
            local source="$1"
            local target="$2"
            docker buildx imagetools create -t "$target" "$source"
          }

          cluster_source="${IMAGE_REPO_BASE}/cluster:${CANDIDATE_TAG}"
          gateway_source="${IMAGE_REPO_BASE}/gateway:${CANDIDATE_TAG}"
          sandbox_source="${IMAGE_REPO_BASE}/sandbox:${CANDIDATE_TAG}"

          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            promote "$cluster_source" "${IMAGE_REPO_BASE}/cluster:latest"
            promote "$gateway_source" "${IMAGE_REPO_BASE}/gateway:latest"
            promote "$sandbox_source" "${IMAGE_REPO_BASE}/sandbox:latest"
          fi

          if [ -n "${RELEASE_TAG}" ]; then
            promote "$cluster_source" "${IMAGE_REPO_BASE}/cluster:${RELEASE_TAG}"
            promote "$gateway_source" "${IMAGE_REPO_BASE}/gateway:${RELEASE_TAG}"
            promote "$sandbox_source" "${IMAGE_REPO_BASE}/sandbox:${RELEASE_TAG}"
          fi
