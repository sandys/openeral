name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pgmount
          POSTGRES_PASSWORD: pgmount
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pgmount"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse3-dev fuse3 pkg-config libpq-dev

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Rust integration tests
        env:
          TEST_DATABASE_URL: "host=localhost user=pgmount password=pgmount dbname=testdb"
        run: cargo test -p pgmount-core

      - name: Seed test data for FUSE tests
        env:
          PGPASSWORD: pgmount
        run: |
          psql -h localhost -U pgmount -d testdb -c "
            CREATE TABLE IF NOT EXISTS public.users (
              id SERIAL PRIMARY KEY,
              name TEXT NOT NULL,
              email TEXT,
              age INTEGER,
              active BOOLEAN DEFAULT true
            );
            INSERT INTO public.users (name, email, age, active) VALUES
              ('Alice', 'alice@example.com', 30, true),
              ('Bob', 'bob@example.com', 25, false),
              ('Charlie', 'charlie@example.com', 35, true)
            ON CONFLICT DO NOTHING;
          "

      - name: FUSE mount integration tests
        env:
          PGPASSWORD: pgmount
          DB_CONN: "host=localhost user=pgmount password=pgmount dbname=testdb"
          DB_HOST: localhost
          PGMOUNT_TEST_MNT: /mnt/pgtest
        run: |
          sudo mkdir -p /mnt/pgtest
          sudo chmod 777 /mnt/pgtest
          sudo sed -i 's/#user_allow_other/user_allow_other/' /etc/fuse.conf || true
          bash tests/test_fuse_mount.sh
